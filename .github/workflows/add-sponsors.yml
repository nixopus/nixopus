name: Generate Sponsors README

on:
  workflow_dispatch: # Manual trigger
  push: # On merge/push
    branches: [main, master, feature-develop, feat/develop, shravan20-patch-1]
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight

permissions:
  contents: write
  
jobs:
  update-sponsors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug Sponsors API
        run: |
          curl -s -H "Authorization: token ${{ secrets.PAT }}" \
          -H "Content-Type: application/json" \
          -d '{"query":"query { user(login:\"raghavyuva\") { sponsorshipsAsMaintainer(first: 100) { nodes { sponsor { login } tier { name } } } } }"}' \
          https://api.github.com/graphql | jq .

      - name: Fetch Sponsorships and Commit
        uses: santoshyadavdev/sponsorship-green-squares@main
        with:
          allow-add-to-readme: 'true' # Default value, set to 'true' to enable README updates
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          # do not use GITHUB_TOKEN as it lacks the permission to call graphql APIs,
          #create a new Personal Access TOKEN and provide read:org access to read to sponsorship data
