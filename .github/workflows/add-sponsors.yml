name: Generate Sponsors README

on:
  workflow_dispatch: # Manual trigger
  push: # On merge/push
    branches: [main, master, feature-develop, feat/develop, shravan20-patch-1]
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight

permissions:
  contents: write
  sponsorships: read

jobs:
  update-sponsors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}  # PAT with repo + read:user

      - name: Fetch and Update Sponsors
        run: |
          # Install jq for JSON parsing
          sudo apt-get install -y jq

          # GraphQL query to fetch sponsors
          SPONSORS_JSON=$(curl -s -H "Authorization: token ${{ secrets.PAT }}" \
            -X POST -d '{
              "query": "query { user(login:\"YOUR_GITHUB_USERNAME\") { sponsorshipsAsMaintainer(first: 100) { nodes { sponsor { login, avatarUrl, url } tier { name } } } } }"
            }' https://api.github.com/graphql)

          # Parse JSON and generate markdown
          echo "$SPONSORS_JSON" | jq -r '
            "## 🎗️ Sponsors\n",
            (.data.user.sponsorshipsAsMaintainer.nodes[] | 
              "- [![@\(.sponsor.login)](\(.sponsor.avatarUrl&size=32))](\(.sponsor.url)) **\(.sponsor.login)** (\(.tier.name))"
            ),
            "\n❤️ Thank you for your support!"
          ' > sponsors.md

          # Update README (preserves other content)
          awk -v new="$(cat sponsors.md)" '
            /<!-- sponsors-start -->/ { print; print new; f=1 }
            /<!-- sponsors-end -->/ { f=0 }
            !f { print }
          ' README.md > README.tmp && mv README.tmp README.md

          # Debug output
          echo "--- Updated README ---"
          cat README.md | grep -A10 "Sponsors"

      - name: Commit Changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Update sponsors"
          git push
